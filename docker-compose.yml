services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tcip
      POSTGRES_USER: tcip
      POSTGRES_PASSWORD: tcip
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcip -d tcip"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      ENVIRONMENT: development
      DATA_MODE: mock
      DATABASE_URL: postgresql+psycopg://tcip:tcip@postgres:5432/tcip
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000"]'
      TRACKED_SYMBOLS: '["SPY","QQQ","IWM"]'
      CORRELATION_SYMBOLS: '["SPY","QQQ","IWM","VIX","DXY","TNX"]'
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
